<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>佳佳的影视世界</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>🎬 佳佳的影视观赏记录</h1>
        <p>记录那些触动心灵的精彩故事</p>
    </header>

    <main>
        <section class="movies-section">
            <h2>📽️ 电影</h2>
            <div class="media-grid" id="movies-grid">
                <!-- 电影内容将通过JavaScript动态加载 -->
            </div>
        </section>

        <section class="tv-series-section">
            <h2>📺 电视剧</h2>
            <div class="media-grid" id="tv-grid">
                <!-- 电视剧内容将通过JavaScript动态加载 -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 佳佳的影视世界 · 记录每一份感动</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
